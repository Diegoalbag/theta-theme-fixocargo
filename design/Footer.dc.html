<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<script src="https://cdn.tailwindcss.com"></script>
<script>window.tailwind=window.tailwind||{};tailwind.config={theme:{extend:{fontFamily:{display:['"Aku Kamu"','"Arial Narrow"','Impact','sans-serif'],gill:['"Gill Sans"','"Gill Sans MT"','Calibri','sans-serif'],gotham:['Gotham','Montserrat','"Helvetica Neue"','Arial','sans-serif'],opensans:['"Open Sans"','Arial','sans-serif']}}}};</script>
<style>*{box-sizing:border-box;}body{margin:0;}</style>
</helmet>
<div class="relative w-[1920px] h-[379px] bg-[#121c31] p-[60px_300px] font-gill">
  <div class="flex justify-between items-start">
    <div class="flex flex-col gap-[22px]">
      <img src="assets/fixocargo-logo.png" alt="FixoCargo" class="h-[54px] w-auto" />
      <div class="flex gap-[12px]">
        <div class="flex items-center gap-[9px] bg-[#222325] px-[16px] py-[8px] rounded-[8px] text-white">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M16.4 12.7c0-2.1 1.7-3.1 1.8-3.2-1-1.4-2.5-1.6-3-1.6-1.3-.1-2.5.8-3.1.8s-1.6-.7-2.7-.7c-1.4 0-2.7.8-3.4 2.1-1.5 2.5-.4 6.3 1 8.4.7 1 1.5 2.1 2.6 2.1 1 0 1.4-.7 2.7-.7s1.6.7 2.7.6c1.1 0 1.8-1 2.5-2 .8-1.2 1.1-2.3 1.1-2.3s-2.1-.8-2.2-3.2zM14.3 6.3c.6-.7 1-1.7.9-2.7-.8 0-1.9.6-2.5 1.3-.5.6-1 1.6-.9 2.5.9.1 1.9-.5 2.5-1.1z"/></svg>
          <span class="leading-[1.1] text-left"><span class="block text-[10px] opacity-85">Descárgalo en el</span><span class="block font-bold text-[15px]">App Store</span></span>
        </div>
        <div class="flex items-center gap-[9px] bg-[#222325] px-[16px] py-[8px] rounded-[8px] text-white">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3.6 2.3 13 11.7l-2.6 2.6L3.6 21c-.4-.2-.6-.6-.6-1.1V3.4c0-.5.2-.9.6-1.1zM14.4 13.1l2.7 2.7-3.3 1.9-2.1-2.1 2.7-2.5zm0-2.8L11.7 7.8 13.8 5.7l3.3 1.9-2.7 2.7zM18.2 9.3l2.6 1.5c.7.4.7 1.4 0 1.8l-2.6 1.5-2.9-2.4 2.9-2.4z"/></svg>
          <span class="leading-[1.1] text-left"><span class="block text-[10px] opacity-85">Disponible en</span><span class="block font-bold text-[15px]">Google Play</span></span>
        </div>
      </div>
    </div>
    <div class="flex gap-[60px]">
      <sc-for list="{{ footerCols }}" as="col" hint-placeholder-count="3">
        <div class="min-w-[150px] flex flex-col gap-[8px]">
          <span class="font-gotham font-bold text-[16px] leading-[24px] text-white mb-[2px]">{{ col.title }}</span>
          <sc-for list="{{ col.items }}" as="it" hint-placeholder-count="4"><span class="text-[14px] leading-[24px] text-white">{{ it }}</span></sc-for>
        </div>
      </sc-for>
    </div>
  </div>
  <div class="h-[1px] bg-white my-[36px]"></div>
  <div class="flex items-center justify-between">
    <span class="text-[15px] leading-[24px] tracking-[-0.2px] text-white">© FixoCargo, Inc. 2026. Todos los derechos reservados.</span>
    <div class="flex gap-[24px]"><span class="text-[14px] leading-[20px] text-white">Términos y condiciones</span><span class="text-[14px] leading-[20px] text-white">Políticas de privacidad</span></div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1920,&quot;height&quot;:379}}">
class Component extends DCLogic {
  renderVals() {
    return {
      footerCols: [
        { title: 'Que Ofrecemos', items: ['Servicios', 'Beneficios', 'FX logistics'] },
        { title: 'Compañia', items: ['Quienes Somos?', 'Franquicias Internacionales', 'Fixolidario', 'Preguntas Frecuentes'] },
        { title: 'Redes Sociales', items: ['Instagram', 'Facebook', 'Twitter', 'Youtube'] },
      ],
    };
  }
}
</script>
</body>
</html>
