<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<script src="https://cdn.tailwindcss.com"></script>
<script>window.tailwind=window.tailwind||{};tailwind.config={theme:{extend:{fontFamily:{display:['"Aku Kamu"','"Arial Narrow"','Impact','sans-serif'],gill:['"Gill Sans"','"Gill Sans MT"','Calibri','sans-serif'],gotham:['Gotham','Montserrat','"Helvetica Neue"','Arial','sans-serif'],opensans:['"Open Sans"','Arial','sans-serif']}}}};</script>
<style>*{box-sizing:border-box;}body{margin:0;}</style>
</helmet>
<div class="relative w-[1920px] h-[100px] bg-[#121c31] border-t border-[#e5e7e8] font-gill">
  <div class="absolute left-[300px] top-[27px] w-[1320px] h-[48px] flex items-center gap-[30px]">
    <img src="assets/fixocargo-logo.png" alt="FixoCargo" class="h-[48px] w-auto block" />
    <div class="flex-1 flex items-center justify-end gap-[40px]">
      <sc-for list="{{ nav }}" as="item" hint-placeholder-count="7">
        <div class="flex items-center gap-[2px]">
          <span class="font-opensans text-[16px] leading-[24px] text-white whitespace-nowrap">{{ item.label }}</span>
          <sc-if value="{{ item.caret }}" hint-placeholder-val="{{ false }}">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M7 10l5 5 5-5z"/></svg>
          </sc-if>
        </div>
      </sc-for>
    </div>
    <div class="w-[138px] h-[48px] rounded-full border border-white flex items-center justify-center gap-[8px]">
      <span class="font-opensans text-[16px] leading-[24px] text-white">Mi Cuenta</span>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-4 0-9 2-9 6v2h18v-2c0-4-5-6-9-6z"/></svg>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1920,&quot;height&quot;:100}}">
class Component extends DCLogic {
  renderVals() {
    return {
      nav: [
        { label: 'Inicio', caret: true },
        { label: 'Servicios', caret: false },
        { label: 'Nosotros', caret: true },
        { label: 'Beneficios', caret: false },
        { label: 'Sucursales', caret: false },
        { label: 'FX Logistics', caret: false },
        { label: 'Blog', caret: false },
      ],
    };
  }
}
</script>
</body>
</html>
